<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paradise Lawn Care Invoice App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app">

    <div class="header">
      <img src="images/logo.png" alt="Paradise Lawn Care Logo" class="logo">

      <div class="company-info">
        <h1>Paradise Lawn Care, LLC</h1>
        <h2>We Make Your Lawn Paradise Perfect.</h2>
        <p>📞 772-323-9401</p>
        <p>✉ ParadiseLawncare772@gmail.com</p>
        <p>📍 5685 SE Ault Ave., Suite 1<br>Stuart, FL 34997</p>
      </div>
      <div class="grass">
    <img src="images/grass.png" alt="Grass">
</div>

    </div>

    <div class="section row">
      <div>
        <label>Job Number</label>
        <input id="jobNumber" value="PL-2607-00001">
      </div>

      <div>
        <label>Today Date</label>
        <input type="date" id="todayDate">
      </div>

      <div>
        <label>Due Date</label>
        <input type="date" id="dueDate">
      </div>
    </div>

    <div class="section">
      <h3>Client Info</h3>

      <label>Business Name</label>
      <input id="businessName">

      <label>Client Name</label>
      <input id="clientName">

      <label>Billing Address</label>
      <input id="billingAddress">

      <label>City, State, ZIP</label>
      <input id="cityStateZip">

      <div class="row">
        <div>
          <label>Phone</label>
          <input id="phone">
        </div>

        <div>
          <label>Email</label>
          <input id="email">
        </div>
      </div>
    </div>

    <div class="section">
      <div class="service-header">
        <h3>Services Performed</h3>
        <button type="button" onclick="addServiceRow()">+ Add Service Line</button>
      </div>

      <div class="service-labels">
        <strong>Date</strong>
        <strong>Service Address</strong>
        <strong>Service</strong>
        <strong>Amount</strong>
      </div>

      <div id="serviceRows"></div>

      <p class="small-note">Starts with 5 service lines. Maximum 20.</p>
    </div>

    <div class="section row">
      <div>
        <label>Tax</label>
        <select id="taxRate">
          <option value="0">No Tax</option>
          <option value="0.065">Florida Tax 6.5%</option>
        </select>
      </div>

      <div>
        <label>Payment Method</label>
        <select id="paymentMethod">
          <option value="0">Cash</option>
          <option value="0">Business Check</option>
          <option value="0">Zelle</option>
          <option value="0.035">Credit Card +3.5%</option>
        </select>
      </div>
    </div>

    <div class="section">
      <label>Notes</label>
      <textarea id="notes" rows="4"></textarea>
    </div>

    <div class="totals">
      <p>Subtotal: <strong id="subtotal">$0.00</strong></p>
      <p>Total: <strong id="total">$0.00</strong></p>
    </div>

    <div class="buttons">
      <button type="button" onclick="resetForm()">Reset</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
